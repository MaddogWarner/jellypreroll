name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep secrets
        run: |
          python3 -m pip install --quiet semgrep
          semgrep --config=p/secrets --error --quiet

      - name: Semgrep default + OWASP
        run: semgrep --config=p/default --config=p/owasp-top-ten --quiet || true
