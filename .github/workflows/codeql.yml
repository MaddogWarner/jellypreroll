name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '27 3 * * 1'

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      # C# is compiled, so CodeQL needs an explicit build to analyse.
      - name: Build
        run: dotnet build -c Release Jellyfin.Plugin.PreRoll/Jellyfin.Plugin.PreRoll.csproj

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
